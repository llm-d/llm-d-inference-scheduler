version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

formatters:
  enable:
    - goimports
    - gofmt

linters:
  enable:
    - bodyclose
    - copyloopvar
    - dupword
    - durationcheck
    - errcheck
    - fatcontext
    - ginkgolinter
    - goconst
    - gocritic
    - govet
    - ineffassign
    - loggercheck
    - makezero
    - misspell
    - nakedret
    - perfsprint
    - prealloc
    - revive
    - staticcheck
    - unparam
    - unused
    - unconvert
  exclusions:
    presets:
      - comments        # suppress missing comment violations on packages and exported symbols
      - std-error-handling  # suppress unchecked errors on well-known stdlib patterns (e.g. Close())
    rules:
      # Package names inherited from GAIE upstream (common, types, utils, http) are intentional
      - linters: [revive]
        text: "avoid meaningless package names"
      - linters: [revive]
        text: "avoid package names that conflict with Go standard library package names"
      # RequestId and Url are JSON-serialized API fields; renaming would break callers
      - linters: [revive]
        text: "struct field RequestId should be RequestID"
      - linters: [revive]
        text: "struct field Url should be URL"
      # NewDatastore returning unexported type requires a larger interface refactor
      - linters: [revive]
        text: "exported func NewDatastore returns unexported type"
      # Underscore names inherited from migrated code (e.g. a_ep, b_ep, selector_v1)
      - linters: [revive]
        text: "don't use underscores in Go names"
      # Public const with 30+ callers; rename would be API-breaking
      - linters: [revive]
        text: "should be RequestIDHeaderKey"
      # Internal variable names from migrated code
      - linters: [revive]
        text: "should be metricsHTTPClient"
      - linters: [revive]
        text: "should be errorBadPluginJSONText"
      - linters: [revive]
        text: "should be inputIDs"
      - linters: [revive]
        text: "should be requestID"
      # Experimental public var from GAIE upstream; rename would break callers
      - linters: [revive]
        text: "should be Experimental_DefaultPrefillProfile"
      # predicted_tpot and predicted_ttft are local vars in migrated latency code
      - linters: [revive]
        text: "should be predictedTPOT"
      - linters: [revive]
        text: "should be predictedTTFT"
      # tp_filterAll is a local var in migrated filter code
      - linters: [revive]
        text: "should be tpFilterAll"
      # goconst and prealloc findings in tests are low-value noise
      - linters: [goconst, prealloc]
        path: "_test\\.go"
  settings:
    revive: # see https://github.com/mgechev/revive#available-rules for all options
      rules:
        - name: blank-imports
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: var-naming
        - name: package-comments
        - name: range
        - name: time-naming
        - name: unexported-return
        - name: errorf

issues:
  # do not limit the number of issues, ensure even identical are reported
  max-issues-per-linter: 0
  max-same-issues: 0
  # Note: 'new' setting is controlled via Makefile LINT_NEW_ONLY variable
  # Set to true to only check new code, false (default) to check all code
