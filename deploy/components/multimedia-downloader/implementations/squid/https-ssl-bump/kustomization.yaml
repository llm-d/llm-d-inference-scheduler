apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../http

patches:
# Replace squid.conf with the SSL Bump version
- path: squid-config-ssl-bump.yaml

# All Deployment modifications required for SSL Bump
- target:
    kind: Deployment
    name: multimedia-downloader
  patch: |
    - op: replace
      path: /spec/template/spec/containers/0/ports/0/containerPort
      value: 3128
    - op: add
      path: /spec/template/spec/containers/0/volumeMounts/-
      value:
        name: squid-ssl-certs
        mountPath: /etc/squid/certs
        readOnly: true
    - op: add
      path: /spec/template/spec/volumes/-
      value:
        name: squid-ssl-certs
        secret:
          secretName: squid-ssl-certs
    - op: replace
      path: /spec/template/spec/containers/0/command
      value: ["/usr/local/bin/docker-entrypoint.sh"]
    - op: replace
      path: /spec/template/spec/containers/0/args
      value: ["squid", "-NYd", "1"]
    - op: add
      path: /spec/template/spec/securityContext
      value:
        runAsNonRoot: true
    - op: add
      path: /spec/template/spec/containers/0/securityContext
      value:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsUser: 13
    - op: add
      path: /spec/template/spec/containers/1/securityContext
      value:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsUser: 13

# Add your image override at the bottom:
images:
- name: ubuntu/squid
  newName: squid-ssl-bump
  newTag: local

labels:
- pairs:
    cache-implementation: squid-ssl-bump
