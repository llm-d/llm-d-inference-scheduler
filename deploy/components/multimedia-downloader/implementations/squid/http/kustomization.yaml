apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- squid-config.yaml
- deployment.yaml

labels:
- pairs:
    cache-implementation: squid

# Override the squid image in an overlay via:
#   images:
#   - name: ubuntu/squid
#     newName: my-registry/squid
#     newTag: "6.10"
images:
- name: ubuntu/squid
  newTag: 6.1-23.10_beta
