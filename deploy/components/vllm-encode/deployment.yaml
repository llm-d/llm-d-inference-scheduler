apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-e
  labels:
    app: ${POOL_NAME}
spec:
  replicas: ${VLLM_REPLICA_COUNT_E}
  selector:
    matchLabels:
      app: ${POOL_NAME}
  template:
    metadata:
      labels:
        app: ${POOL_NAME}
        llm-d.ai/role: encode
    spec:
      containers:
      - name: vllm
        # VLLM_IMAGE can be a simulator (e.g. llm-d-inference-sim) or a real
        # vLLM image (e.g. vllm/vllm-openai:v0.16.0)
        image: ${VLLM_IMAGE}
        imagePullPolicy: IfNotPresent
        args:
        - "--model=${MODEL_NAME}"
        - "--port=8000"
        - "--data-parallel-size=${VLLM_DATA_PARALLEL_SIZE}"
        - "--no-enable-prefix-caching"
        - "--mm-encoder-only"
        ports:
        - name: encode-http
          containerPort: 8000
          protocol: TCP
        - name: encode-rank1
          containerPort: 8001
          protocol: TCP
        - name: encode-rank2
          containerPort: 8002
          protocol: TCP
        - name: encode-rank3
          containerPort: 8003
          protocol: TCP
        - name: encode-rank4
          containerPort: 8004
          protocol: TCP
        - name: encode-rank5
          containerPort: 8005
          protocol: TCP
        - name: encode-rank6
          containerPort: 8006
          protocol: TCP
        - name: encode-rank7
          containerPort: 8007
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /v1/models
            port: 8000
          initialDelaySeconds: 2
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /v1/models
            port: 8000
          initialDelaySeconds: 2
          periodSeconds: 10
        env:
        - name: PORT
          value: "8000"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
