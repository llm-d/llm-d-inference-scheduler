# ------------------------------------------------------------------------------
# Real vLLM Overlay
#
# Adds real vLLM-specific configuration:
#   - KV cache event publishing on Decode (per-pod ZMQ publisher on localhost:5557)
#     EPP subscribes to each pod individually using the topic kv@<POD_IP>@<MODEL_NAME>
#   - EC transfer config for encode/decode disaggregation (producer on encode,
#     consumer on prefill/decode)
#   - Shared PVC for encoder embeddings cache
#
# Uses JSON patches to add args without replacing existing ones.
#
# Usage: include as a Kustomize component in scenario overlays:
#   components:
#   - ../../../components/overlays/real-vllm/
# ------------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
- pvc.yaml

patches:
# --- Decode deployment (vllm-d): KV cache event publisher ---
# vLLM publishes KV cache events to a per-pod ZMQ socket. The EPP subscribes
# to each pod individually using the topic kv@<POD_IP>@<MODEL_NAME>.
- target:
    kind: Deployment
    name: vllm-d
  patch: |
    - op: add
      path: /spec/template/spec/containers/0/args/-
      value: "--kv-events-config"
    - op: add
      path: /spec/template/spec/containers/0/args/-
      value: '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"tcp://localhost:5557","topic":"kv@${POD_IP}@${MODEL_NAME}"}'

# --- Encode deployment (vllm-e): EC producer ---
- target:
    kind: Deployment
    name: vllm-e
  patch: |
    - op: add
      path: /spec/template/spec/containers/0/args/-
      value: "--ec-transfer-config"
    - op: add
      path: /spec/template/spec/containers/0/args/-
      value: '{"ec_connector": "ECExampleConnector", "ec_role": "ec_producer", "ec_connector_extra_config": {"shared_storage_path": "/shared-ec-cache"}}'
    - op: add
      path: /spec/template/spec/containers/0/volumeMounts/-
      value:
        name: ec-cache
        mountPath: /shared-ec-cache
    - op: add
      path: /spec/template/spec/volumes/-
      value:
        name: ec-cache
        persistentVolumeClaim:
          claimName: ec-cache-pvc
