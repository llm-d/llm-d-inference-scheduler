# ------------------------------------------------------------------------------
# Custom Resource Definitions (CRDs) for scheduler-owned APIX resources.
#
# InferencePool remains owned by GIE/IGW. This component only installs
# InferenceObjective and InferenceModelRewrite.
#
# **Warning**: CRDs are cluster-level, so in a shared development environment
# this needs to be done in a controlled and communicated manner.
# ------------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- bases/inference.networking.x-k8s.io_inferenceobjectives.yaml
- bases/inference.networking.x-k8s.io_inferencemodelrewrites.yaml
