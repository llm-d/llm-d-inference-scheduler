apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-d
spec:
  template:
    metadata:
      labels:
        llm-d.ai/role: encode-prefill-decode
    spec:
      initContainers:
      - name: routing-sidecar
        $patch: delete
      containers:
      - name: vllm
        args:
        - "--model=${MODEL_NAME}"
        - "--port=8000"
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: rank1
          $patch: delete
        - name: rank2
          $patch: delete
        - name: rank3
          $patch: delete
        - name: rank4
          $patch: delete
        - name: rank5
          $patch: delete
        - name: rank6
          $patch: delete
        - name: rank7
          $patch: delete
        readinessProbe:
          httpGet:
            path: /v1/models
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /v1/models
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        env:
        - name: PORT
          value: "8000"
