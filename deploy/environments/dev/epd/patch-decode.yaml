apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-d
spec:
  template:
    metadata:
      labels:
        llm-d.ai/role: ${DECODE_ROLE}
    spec:
      initContainers:
      - name: routing-sidecar
        $patch: delete
      containers:
      - name: vllm
        args:
        - "--mode=${VLLM_SIM_MODE}"
        - "--port=8000"
        - "--model=${MODEL_NAME}"
        - "--enable-kvcache=${KV_CACHE_ENABLED}"
        - "--kv-cache-size=1024"
        - "--block-size=16"
        - "--zmq-endpoint=tcp://${EPP_NAME}.${NAMESPACE}.svc.cluster.local:5557"
        - "--data-parallel-size=${VLLM_DATA_PARALLEL_SIZE}"
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: rank1
          $patch: delete
        - name: rank2
          $patch: delete
        - name: rank3
          $patch: delete
        - name: rank4
          $patch: delete
        - name: rank5
          $patch: delete
        - name: rank6
          $patch: delete
        - name: rank7
          $patch: delete
        readinessProbe:
          httpGet:
            path: /v1/models
            port: 8000
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /v1/models
            port: 8000
          initialDelaySeconds: 2
          periodSeconds: 10
        env:
        - name: PORT
          value: "8000"
