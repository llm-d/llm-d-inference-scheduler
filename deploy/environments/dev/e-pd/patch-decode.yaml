apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-d
spec:
  template:
    metadata:
      labels:
        llm-d.ai/role: prefill-decode
    spec:
      initContainers:
      - name: routing-sidecar
        args:
        - "--port=8000"
        - "--vllm-port=8200"
        - "--ec-connector=${EC_CONNECTOR_TYPE}"
        - "--secure-proxy=false"
        - "--data-parallel-size=${VLLM_DATA_PARALLEL_SIZE}"
      containers:
      - name: vllm
        args:
        - "--mode=${VLLM_MODE}"
        - "--port=8200"
        - "--model=${MODEL_NAME}"
        - "--data-parallel-size=${VLLM_DATA_PARALLEL_SIZE}"
        - "--ec-transfer-config"
        - '{"ec_connector": "ECExampleConnector", "ec_role": "ec_consumer", "ec_connector_extra_config": {"shared_storage_path": "/shared-ec-cache"}}'
        volumeMounts:
        - name: uds-socket
          mountPath: /tmp/tokenizer
        - name: ec-cache
          mountPath: /shared-ec-cache
      volumes:
      - name: uds-socket
        emptyDir: {}
      - name: ec-cache
        emptyDir: {}
