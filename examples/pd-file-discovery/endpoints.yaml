endpoints:
  - name: prefill-0
    address: sim-prefill   # docker-compose service name; replace with IP for bare-metal
    port: "8000"
    labels:
      model: Qwen/Qwen2.5-1.5B-Instruct
      llm-d.ai/role: prefill

  - name: decode-0
    address: sim-decode    # docker-compose service name; replace with IP for bare-metal
    port: "8000"           # sidecar listens on 8000 (shares sim-decode's network namespace)
    labels:
      model: Qwen/Qwen2.5-1.5B-Instruct
      llm-d.ai/role: decode
