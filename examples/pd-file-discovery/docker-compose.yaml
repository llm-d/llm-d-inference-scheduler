services:
  sim-prefill:
    image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.2
    command:
      - --model=Qwen/Qwen2.5-1.5B-Instruct
    ports:
      - "8000:8000"

  sim-decode:
    image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.2
    command:
      - --model=Qwen/Qwen2.5-1.5B-Instruct
      - --port=8001
    ports:
      - "8002:8000"   # exposes sidecar's port 8000 on host as 8002

  sidecar-decode:
    image: ghcr.io/llm-d/llm-d-routing-sidecar:latest
    command:
      - --port=8000
      - --vllm-port=8001
      - --kv-connector=shared-storage
      - --secure-proxy=false
    network_mode: "service:sim-decode"
    depends_on:
      - sim-decode

  # epp:
  #   image: ghcr.io/llm-d/llm-d-inference-scheduler:latest
  #   command:
  #     - --config-file=/etc/epp/epp-config.yaml
  #     - --grpc-port=9002
  #     - --grpc-health-port=9003
  #     - --metrics-port=9090
  #     - --secure-serving=false
  #   volumes:
  #     - ./epp-config.yaml:/etc/epp/epp-config.yaml
  #     - ./endpoints.yaml:/etc/epp/endpoints.yaml
  #   depends_on:
  #     - sim-prefill
  #     - sim-decode

  envoy:
    image: envoyproxy/envoy:distroless-v1.33.2
    command: ["-c", "/etc/envoy/envoy.yaml"]
    ports:
      - "8081:8081"
    volumes:
      - ./envoy-epp-host.yaml:/etc/envoy/envoy.yaml
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets Envoy reach EPP on the host
    # depends_on:
    #   - epp
