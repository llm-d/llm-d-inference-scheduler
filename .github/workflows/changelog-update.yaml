name: Update Changelog on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  update-changelog:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Update CHANGELOG.md
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
        run: |
          NOTE=$(printf '%s' "$PR_BODY" | tr -d '\r' | \
            sed -n '/^```release-note/,/^```/p' | sed '1d;$d' | xargs)

          if [[ -z "$NOTE" || "${NOTE,,}" == "none" ]]; then
            echo "No valid release note found. Exiting."
            exit 0
          fi

          touch CHANGELOG.md
          printf '%s\n%s\n' "${PR_MERGED_AT:0:10} $PR_URL $NOTE" "$(cat CHANGELOG.md)" > CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for PR #${{ github.event.pull_request.number }}"
          git push
